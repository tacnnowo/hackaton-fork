<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tribunal Hackathon</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <script src="script.js" defer></script>

  <div class="status-bar">
    <div class="progress" id="progress-text">Caso 1 de 5</div>
    <div class="instructions">Leia as respostas e escolha quem colocou a segurança digital em risco.</div>
  </div>

  <div class="container">
    <div class="station papel-juiz">
      <div class="bubble bubble-judge" id="bubble-judge">
        <div class="bubble-name">Larry</div>
        <div class="bubble-content" id="text-judge"></div>
      </div>
      <img class="character" id="character-judge" src="assets/img/larry-1.png.png" alt="Juiz Larry" />
      <img class="mesa" src="https://static.vecteezy.com/system/resources/thumbnails/010/870/464/small/empty-wooden-table-top-isolated-png.png" alt="Mesa do Juiz" />
    </div>

    <div class="station papel-acusacao">
      <div class="bubble bubble-left" id="bubble-left">
        <div class="bubble-name">Chuck</div>
        <div class="bubble-content" id="text-left"></div>
      </div>
      <img class="character" id="character-chuck" src="assets/img/chucky.jpg" alt="Chuck" />
      <img class="mesa" src="https://static.vecteezy.com/system/resources/thumbnails/010/870/464/small/empty-wooden-table-top-isolated-png.png" alt="Mesa do Chuck" />
    </div>

    <div class="station papel-defesa">
      <div class="bubble bubble-right" id="bubble-right">
        <div class="bubble-name">Rigby</div>
        <div class="bubble-content" id="text-right"></div>
      </div>
      <img class="character" id="character-rigby" src="assets/img/rigby.png" alt="Rigby" />
      <img class="mesa" src="https://static.vecteezy.com/system/resources/thumbnails/010/870/464/small/empty-wooden-table-top-isolated-png.png" alt="Mesa do Rigby" />
    </div>
  </div>

  <div class="decision-panel" id="decision-panel">
    <button type="button" id="vote-chuck">Chuck é culpado</button>
    <button type="button" id="vote-rigby">Rigby é culpado</button>
  </div>

  <div class="result-panel" id="result-panel"></div>
</body>
</html>
