<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tribunal Hackathon</title>
  <style>
    /* Estilização do fundo para dar um clima de sala */
    body {
      margin: 0;
      padding: 40px;
      background-color: #000000;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* O layout do tribunal usando Grid Areas */
    .container {
      display: grid;
      grid-template-areas:
        ". juiz ."
        "acusacao . defesa";
      gap: 30px;
      max-width: 1000px;
      width: 100%;
    }

    /* Distribuindo os papéis no grid */
    .papel-juiz { grid-area: juiz; transform: scale(1.1); margin-bottom: 40px; }
    .papel-acusacao { grid-area: acusacao; }
    .papel-defesa { grid-area: defesa; }

    /* Container de cada pessoa + mesa */
    .station {
      position: relative;
      width: 250px;
      height: 300px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      justify-content: flex-end; /* Empurra o personagem para perto da mesa */
      align-items: center;
    }

    /* O personagem fica atrás da mesa */
    .character {
      width: 80%; /* Um pouco menor que a mesa para caber atrás */
      position: relative;
      z-index: 1;
      padding-bottom: 25px; /* Evita que o personagem fique escondido demais pela mesa */
    }

    /* A mesa fica posicionada absolutamente por cima e na base */
    .mesa {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 2;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div class="container">
    
    <div class="station papel-juiz">
      <img class="character" src="assets/img/larry-1.png.png" alt="Juiz Larry" />
      <img class="mesa" src="https://static.vecteezy.com/system/resources/thumbnails/010/870/464/small/empty-wooden-table-top-isolated-png.png" alt="Mesa do Juiz" />
    </div>

    <div class="station papel-acusacao">
      <img class="character" src="assets/img/chucky.jpg" alt="Chucky" />
      <img class="mesa" src="https://static.vecteezy.com/system/resources/thumbnails/010/870/464/small/empty-wooden-table-top-isolated-png.png" alt="Mesa" />
    </div>

    <div class="station papel-defesa">
      <img class="character" src="assets/img/rigby.png" alt="Rigby" />
      <img class="mesa" src="https://static.vecteezy.com/system/resources/thumbnails/010/870/464/small/empty-wooden-table-top-isolated-png.png" alt="Mesa" />
    </div>

  </div>

</body>
</html>
